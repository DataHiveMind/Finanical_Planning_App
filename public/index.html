<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Financial Planner - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>AI Wealth Planner</h1>
            <p>Your quantitative financial advisor.</p>
        </header>

        <form id="loginForm" class="auth-form">
            <h2>Sign In</h2>
            
            <div class="input-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" name="email" required placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-primary">Login</button>
            <div id="loginError" class="error-message"></div>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
